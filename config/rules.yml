rules:
  - name: "SSH failed login"
    enabled: true
    severity: "high"
    description: "Detects failed SSH login attempts."
    match:
      contains_any:
        - "Failed password"
        - "Invalid user"
        - "authentication failure"
      regex_any: []
      host_any: []
      source_ip_any: []
      program_any:
        - "sshd"
      severity_any: []
      facility_any: []
    cooldown_seconds: 300
    cooldown_key: "rule_host_message"
    discord: true
    action: "Send Discord alert and show in Alerts page."

  - name: "Disk or filesystem problem"
    enabled: true
    severity: "critical"
    description: "Detects I/O errors and filesystem issues."
    match:
      contains_any:
        - "I/O error"
        - "filesystem error"
        - "Read-only file system"
        - "No space left on device"
      regex_any: []
      host_any: []
      source_ip_any: []
      program_any: []
      severity_any: []
      facility_any: []
    cooldown_seconds: 600
    cooldown_key: "rule_host"
    discord: true
    action: "Check disk health and filesystem status."

  - name: "OOM killer invoked"
    enabled: true
    severity: "critical"
    description: "Detects out-of-memory killer activity."
    match:
      contains_any:
        - "Out of memory"
        - "oom-kill"
        - "Killed process"
      regex_any: []
      host_any: []
      source_ip_any: []
      program_any: []
      severity_any: []
      facility_any: []
    cooldown_seconds: 300
    cooldown_key: "rule_host"
    discord: true
    action: "Investigate memory usage on the host."

  - name: "Service restart"
    enabled: true
    severity: "medium"
    description: "Detects services being restarted by systemd."
    match:
      contains_any:
        - "Stopped"
        - "Starting"
      regex_any:
        - "systemd.*: (Stopped|Starting) "
      host_any: []
      source_ip_any: []
      program_any:
        - "systemd"
      severity_any: []
      facility_any: []
    cooldown_seconds: 300
    cooldown_key: "rule_host_message"
    discord: false
    action: "Monitor for repeated service restarts."
