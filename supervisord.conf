[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:bottle-api]
command=python -m src.api.server
directory=/Mite
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED=1

