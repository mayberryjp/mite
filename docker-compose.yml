version: "3"
services:
  Mite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Mite
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./rules:/app/rules
      - ./analysis:/app/analysis
      - ./logs:/app/logs
    environment:
      - MITE_API_HOST=0.0.0.0
      - MITE_API_PORT=8080
      - MITE_SYSLOG_UDP_HOST=0.0.0.0
      - MITE_SYSLOG_UDP_PORT=1514
      - MITE_SYSLOG_TCP_HOST=0.0.0.0
      - MITE_SYSLOG_TCP_PORT=1515
      - MITE_DB_PATH=/app/data/Mite.sqlite
      - MITE_RULES_DIR=/app/rules
      - MITE_ANALYSIS_DIR=/app/analysis
      - MITE_CONFIG_DIR=/app/config
      - MITE_LOGS_DIR=/app/logs
      - DISCORD_WEBHOOK_URL=
      - AI_DISCOVERY_ENABLED=false
      - AI_API_BASE_URL=
      - AI_API_KEY=
      - AI_MODEL=
      - AI_SAMPLE_MIN_COUNT=25
      - AI_SAMPLE_MAX_LINES=100
      - AI_DISCOVERY_INTERVAL_SECONDS=3600
      - LOG_RETENTION_DAYS=14
      - ALERT_RETENTION_DAYS=30
      - TZ=UTC
